name: eveta
description: Eveta shop app.

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  carousel_slider: ^5.0.0
  http: ^1.2.2
  font_awesome_flutter: ^10.7.0
  supabase_flutter: ^2.8.1
  gotrue: ^2.18.0
  flutter_dotenv: ^5.2.1
  convex_bottom_bar: ^3.2.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  google_sign_in: ^6.2.1
  flutter_staggered_grid_view: ^0.7.0
  marquee: ^2.3.0
  cached_network_image: ^3.4.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  qr_flutter: ^4.1.0
  pinput: ^5.0.1
  webview_flutter: ^4.13.1
  image_picker: ^1.2.1
  app_links: ^6.3.2
  gal: ^2.3.2
  lottie: ^3.3.3
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3


# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg
  assets:
    - .env
    - assets/images/ic_home.svg
    - assets/images/home_white.svg
    - assets/images/home_dark.svg
    - assets/images/home_outline_thick.svg
    - assets/images/ic_wishlist.svg
    - assets/images/ic_cart.svg
    - assets/images/ic_cart_swipe_delete.svg
    - assets/images/ic_dashboard.svg
    - assets/images/category.svg
    - assets/images/category_select.svg
    - assets/images/favorite_outline.svg
    - assets/images/favorite_selected.svg
    - assets/images/ic_menu.svg
    - assets/images/ic_location.svg
    - assets/images/ic_add_cart.png
    - assets/images/ic_discount.png
    - assets/images/ic_app_icon.png
    - lib/animation_onboarding/onboarding.svg
    - assets/images/eVeta.svg
    - assets/images/telefono.svg
    - assets/images/auth_logo_light.svg
    - assets/images/auth_logo_dark.svg
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware.

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: CustomIcons
      fonts:
        - asset: assets/CustomIcons.ttf

    - family: Poppins-Bold
      fonts:
        - asset: assets/Poppins-Bold.ttf

    - family: Poppins-Medium
      fonts:
        - asset: assets/Poppins-Medium.ttf
    - family: Roboto-Light
      fonts:
        - asset: assets/Roboto-Light.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
        - asset: assets/fonts/Roboto-Light.ttf
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/ic_app_icon.png
  adaptive_icon_background: "#09CB6B"
  adaptive_icon_foreground: assets/images/ic_app_icon.png
